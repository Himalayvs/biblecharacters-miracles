<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Witnesses of the Word — Biblical Characters & Miracles</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #8a6f2e;
    --parchment: #1a1409;
    --parchment-mid: #231c0d;
    --parchment-card: #1f1a0e;
    --parchment-hover: #2a2211;
    --text-primary: #e8dfc0;
    --text-secondary: #b8a87a;
    --text-dim: #7a6b4a;
    --accent-red: #8b2020;
    --accent-blue: #1e3a5f;
    --accent-green: #1e4a2a;
    --border: rgba(201,168,76,0.2);
    --border-bright: rgba(201,168,76,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--parchment);
    color: var(--text-primary);
    font-family: 'EB Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(139,32,32,0.04) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    text-align: center;
    padding: 60px 20px 50px;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 600px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  header::after {
    content: '✦  ✦  ✦';
    position: absolute;
    bottom: 15px; left: 50%; transform: translateX(-50%);
    color: var(--gold-dim);
    font-size: 10px;
    letter-spacing: 8px;
  }

  .header-ornament {
    font-size: 13px;
    letter-spacing: 6px;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 20px;
    font-family: 'Cinzel', serif;
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(28px, 5vw, 56px);
    color: var(--gold);
    line-height: 1.15;
    text-shadow: 0 0 60px rgba(201,168,76,0.3);
    margin-bottom: 16px;
    letter-spacing: 2px;
  }

  .subtitle {
    font-size: 18px;
    color: var(--text-secondary);
    font-style: italic;
    max-width: 500px;
    margin: 0 auto 8px;
    line-height: 1.6;
  }

  .verse-ref {
    font-size: 13px;
    color: var(--gold-dim);
    font-family: 'Cinzel', serif;
    letter-spacing: 2px;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    color: var(--gold);
    display: block;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Cinzel', serif;
  }

  /* CONTROLS */
  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(26,20,9,0.97);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 360px;
    min-width: 200px;
  }

  .search-wrap::before {
    content: '⚲';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%) rotate(45deg);
    color: var(--gold-dim);
    font-size: 16px;
    pointer-events: none;
  }

  input[type="search"] {
    width: 100%;
    background: var(--parchment-mid);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-primary);
    font-family: 'EB Garamond', serif;
    font-size: 16px;
    padding: 10px 14px 10px 38px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="search"]:focus { border-color: var(--gold-dim); }
  input[type="search"]::placeholder { color: var(--text-dim); }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 8px 14px;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--gold-dim); color: var(--text-secondary); }
  .filter-btn.active { background: var(--gold-dim); border-color: var(--gold-dim); color: var(--parchment); }

  /* MAIN GRID */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 48px 0 32px;
    animation: fadeIn 0.5s ease;
  }

  .section-divider::before,
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
  }

  .section-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 18px;
    color: var(--gold);
    white-space: nowrap;
    letter-spacing: 2px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  /* CHARACTER CARD */
  .card {
    background: var(--parchment-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s ease;
    animation: fadeUp 0.4s ease both;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .card:hover {
    background: var(--parchment-hover);
    border-color: var(--gold-dim);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px rgba(201,168,76,0.05);
  }

  .card:hover::before { opacity: 1; }

  .card-header {
    padding: 20px 20px 14px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .card-icon {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .card-icon.ot { background: rgba(139,32,32,0.15); }
  .card-icon.nt { background: rgba(30,58,95,0.2); }
  .card-icon.prophet { background: rgba(139,32,32,0.12); }
  .card-icon.king { background: rgba(201,168,76,0.08); }
  .card-icon.apostle { background: rgba(30,58,95,0.15); }
  .card-icon.woman { background: rgba(30,74,42,0.15); }

  .card-meta { flex: 1; }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 17px;
    color: var(--gold-light);
    font-weight: 600;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 10px;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .tag-ot { background: rgba(139,32,32,0.25); color: #c47a7a; border: 1px solid rgba(139,32,32,0.3); }
  .tag-nt { background: rgba(30,58,95,0.3); color: #7a9fc4; border: 1px solid rgba(30,58,95,0.4); }
  .tag-prophet { background: rgba(201,168,76,0.12); color: var(--gold-dim); border: 1px solid rgba(201,168,76,0.2); }
  .tag-king { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
  .tag-apostle { background: rgba(30,58,95,0.25); color: #7ab0d4; border: 1px solid rgba(30,58,95,0.4); }
  .tag-woman { background: rgba(30,74,42,0.2); color: #7ac48a; border: 1px solid rgba(30,74,42,0.3); }
  .tag-judge { background: rgba(90,50,10,0.3); color: #c4a07a; border: 1px solid rgba(90,50,10,0.4); }
  .tag-patriarch { background: rgba(60,40,80,0.3); color: #b07ac4; border: 1px solid rgba(60,40,80,0.4); }

  .card-body {
    padding: 0 20px 16px;
    border-top: 1px solid var(--border);
    margin-top: 2px;
  }

  .card-section {
    margin-top: 14px;
  }

  .card-section-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 6px;
  }

  .card-text {
    font-size: 15px;
    line-height: 1.65;
    color: var(--text-secondary);
  }

  .card-text.god-used {
    color: var(--text-primary);
    font-style: italic;
  }

  .card-verse {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    margin-top: 12px;
    letter-spacing: 0.5px;
  }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    font-size: 18px;
    font-style: italic;
    display: none;
    grid-column: 1/-1;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 40px 20px;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 14px;
    font-style: italic;
    position: relative;
  }

  footer::before {
    content: '✦';
    display: block;
    font-size: 16px;
    color: var(--gold-dim);
    margin-bottom: 12px;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .card:nth-child(1){animation-delay:0.02s}
  .card:nth-child(2){animation-delay:0.04s}
  .card:nth-child(3){animation-delay:0.06s}
  .card:nth-child(4){animation-delay:0.08s}
  .card:nth-child(5){animation-delay:0.1s}
  .card:nth-child(6){animation-delay:0.12s}
  .card:nth-child(7){animation-delay:0.14s}
  .card:nth-child(8){animation-delay:0.16s}
  .card:nth-child(9){animation-delay:0.18s}
  .card:nth-child(10){animation-delay:0.2s}
  .card:nth-child(n+11){animation-delay:0.22s}

  .hidden { display: none !important; }

  .result-count {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    padding: 0 24px 0;
    text-align: center;
    margin-top: -16px;
    margin-bottom: 24px;
  }

  /* PAGE TABS */
  .page-tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--parchment-mid);
    position: relative;
  }

  .page-tab {
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 18px 32px;
    text-transform: uppercase;
    transition: all 0.25s;
    position: relative;
  }

  .page-tab:hover { color: var(--text-secondary); }

  .page-tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .page-tab .tab-count {
    display: inline-block;
    background: rgba(201,168,76,0.15);
    border-radius: 20px;
    font-size: 9px;
    padding: 1px 7px;
    margin-left: 8px;
    color: var(--gold-dim);
    vertical-align: middle;
    letter-spacing: 0;
  }

  .page-tab.active .tab-count {
    background: rgba(201,168,76,0.25);
    color: var(--gold);
  }

  /* MIRACLES SECTION */
  #miraclesSection { display: none; }
  #charactersSection { display: block; }

  .miracles-controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(26,20,9,0.97);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }

  .miracle-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  .miracle-card {
    background: var(--parchment-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: all 0.25s ease;
    animation: fadeUp 0.4s ease both;
    position: relative;
  }

  .miracle-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .miracle-card.creation-miracle::before { background: linear-gradient(90deg, transparent, #a0c4a0, transparent); }
  .miracle-card.provision-miracle::before { background: linear-gradient(90deg, transparent, #c4a84c, transparent); }
  .miracle-card.judgment-miracle::before { background: linear-gradient(90deg, transparent, #c46060, transparent); }
  .miracle-card.healing-miracle::before { background: linear-gradient(90deg, transparent, #6090c4, transparent); }
  .miracle-card.resurrection-miracle::before { background: linear-gradient(90deg, transparent, #c4a0e0, transparent); }
  .miracle-card.power-miracle::before { background: linear-gradient(90deg, transparent, #e0a060, transparent); }
  .miracle-card.nature-miracle::before { background: linear-gradient(90deg, transparent, #60c490, transparent); }
  .miracle-card.protection-miracle::before { background: linear-gradient(90deg, transparent, #8090c4, transparent); }

  .miracle-card:hover {
    background: var(--parchment-hover);
    border-color: var(--gold-dim);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .miracle-card:hover::before { opacity: 1; }

  .miracle-header {
    padding: 18px 18px 12px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .miracle-num {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--text-dim);
    background: rgba(201,168,76,0.07);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 4px 8px;
    flex-shrink: 0;
    min-width: 42px;
    text-align: center;
    letter-spacing: 0.5px;
  }

  .miracle-meta { flex: 1; }

  .miracle-name {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    color: var(--gold-light);
    font-weight: 600;
    line-height: 1.2;
    margin-bottom: 5px;
  }

  .miracle-tags { display: flex; gap: 5px; flex-wrap: wrap; }

  .mtag {
    font-size: 10px;
    font-family: 'Cinzel', serif;
    padding: 2px 7px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .mtag-ot { background: rgba(139,32,32,0.2); color: #c47a7a; border: 1px solid rgba(139,32,32,0.3); }
  .mtag-nt { background: rgba(30,58,95,0.25); color: #7a9fc4; border: 1px solid rgba(30,58,95,0.35); }
  .mtag-creation { background: rgba(40,90,40,0.2); color: #80c480; border: 1px solid rgba(40,90,40,0.3); }
  .mtag-provision { background: rgba(201,168,76,0.12); color: var(--gold-dim); border: 1px solid rgba(201,168,76,0.2); }
  .mtag-judgment { background: rgba(139,32,32,0.15); color: #c07070; border: 1px solid rgba(139,32,32,0.25); }
  .mtag-healing { background: rgba(30,58,95,0.2); color: #80a8d8; border: 1px solid rgba(30,58,95,0.3); }
  .mtag-resurrection { background: rgba(90,50,120,0.2); color: #c090e8; border: 1px solid rgba(90,50,120,0.3); }
  .mtag-power { background: rgba(160,90,30,0.2); color: #e0a870; border: 1px solid rgba(160,90,30,0.3); }
  .mtag-nature { background: rgba(30,80,50,0.2); color: #70c498; border: 1px solid rgba(30,80,50,0.3); }
  .mtag-protection { background: rgba(50,60,120,0.2); color: #8090d0; border: 1px solid rgba(50,60,120,0.3); }

  .miracle-body {
    padding: 0 18px 16px;
    border-top: 1px solid var(--border);
    margin-top: 2px;
  }

  .miracle-section { margin-top: 12px; }

  .miracle-section-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 5px;
  }

  .miracle-text {
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--text-secondary);
  }

  .miracle-text.significance {
    color: var(--text-primary);
    font-style: italic;
  }

  .miracle-performer {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    margin-top: 11px;
    letter-spacing: 0.5px;
  }

  .miracle-performer span {
    color: var(--gold-dim);
  }

  /* Category legend */
  .miracles-legend {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--parchment-mid);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    cursor: pointer;
    padding: 5px 10px;
    border-radius: 3px;
    border: 1px solid transparent;
    transition: all 0.2s;
  }

  .legend-item:hover { border-color: var(--border); color: var(--text-secondary); }
  .legend-item.active { border-color: var(--gold-dim); color: var(--text-primary); background: rgba(201,168,76,0.05); }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* CHARACTER NAME DETAIL */
  .name-detail { margin: 5px 0 7px; display: flex; flex-direction: column; gap: 2px; }
  .name-original { font-size: 13px; color: var(--gold-light); font-style: italic; letter-spacing: 0.3px; }
  .name-pron { font-family: 'Cinzel', serif; font-size: 9px; color: var(--gold-dim); letter-spacing: 1.5px; text-transform: uppercase; }
  .name-meaning { font-size: 12.5px; color: var(--text-secondary); font-style: italic; line-height: 1.4; }

  .card-name-origin {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 4px 8px;
    margin-bottom: 6px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }
  .origin-script {
    font-size: 14px;
    color: var(--gold);
    font-family: 'EB Garamond', serif;
    font-style: italic;
  }
  .origin-pronunc {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    letter-spacing: 0.5px;
  }
  .origin-meaning {
    font-size: 12px;
    color: var(--text-secondary);
    font-style: italic;
  }
</style>
<body>

<header>
  <p class="header-ornament">A Complete Biblical Reference</p>
  <h1>Witnesses of the Word</h1>
  <p class="subtitle">Every person God called, shaped, and used throughout the Holy Scriptures</p>
  <p class="verse-ref">From Genesis to Revelation</p>
</header>

<div class="stats-bar">
  <div class="stat"><span class="stat-num" id="totalCount">80+</span><span class="stat-label">Characters</span></div>
  <div class="stat"><span class="stat-num">2</span><span class="stat-label">Testaments</span></div>

    significance: "The vision of the glorified Christ opens the entire book of Revelation, reminding the Church that the suffering Lord of the Gospels is the triumphant, glorified King of history. John's falling down as dead — and Jesus' touch of reassurance — shows that an encounter with the true Christ is always both overwhelming and tender.",
    verse: "Revelation 1:12–18"
  },
  {
    name: "The Second Miraculous Catch of Fish (Post-Resurrection)",
    testament: "nt",
    categories: ["nt","provision","nature","resurrection"],
    cardClass: "provision-miracle",
    performer: "Jesus",
    description: "After a fruitless night of fishing, the risen Jesus stood on the shore, unrecognized. He called out to cast the net on the right side. When they did, they were unable to haul the net in because of the massive catch. John recognized Jesus. Peter jumped into the water. Jesus had already prepared fish and bread on a charcoal fire.",
    significance: "The second miraculous fish catch mirrors the first in Luke 5 that called the disciples, now appearing after the resurrection to recommission them. Jesus' provision of the meal — He already had fish cooking — shows that the risen Lord serves His disciples. The 153 fish caught without the net breaking is an image of the gospel catching all peoples.",

    significance: "Jesus' hour had not yet come — no human plan could cut His life short before the appointed time. His walking through a murderous crowd without harm showed divine sovereignty over timing. His life could only be given, not taken — fulfilling His own words, 'No one takes my life from me; I lay it down of my own accord.'",

function renderCharacters(list) {
  const grid = document.getElementById('characterGrid');
  const countEl = document.getElementById('resultCount');

  if (list.length === 0) {
    grid.innerHTML = '<div class="no-results" style="display:block">No characters found. Try a different search.</div>';
    countEl.textContent = '';
    return;
  }

  // Group by testament
  const ot = list.filter(c => c.testament === 'ot');
  const nt = list.filter(c => c.testament === 'nt');
  const mixed = list.filter(c => c.testament !== 'ot' && c.testament !== 'nt');

  let html = '';

  if (ot.length > 0) {
    html += `<div class="section-divider"><span class="section-title">✦ Old Testament ✦</span></div>
    <div class="grid" id="otGrid">${ot.map(renderCard).join('')}</div>`;
  }
  if (nt.length > 0) {
    html += `<div class="section-divider"><span class="section-title">✦ New Testament ✦</span></div>
    <div class="grid" id="ntGrid">${nt.map(renderCard).join('')}</div>`;
  }
  if (mixed.length > 0) {
    html += `<div class="grid">${mixed.map(renderCard).join('')}</div>`;
  }

  grid.innerHTML = html;
  countEl.textContent = `Showing ${list.length} character${list.length !== 1 ? 's' : ''}`;
  document.getElementById('totalCount').textContent = characters.length;
}

function renderCard(c) {
  const tagHTML = c.tags.map((t, i) => `<span class="tag ${c.tagClasses[i]}">${c.tagLabels[i]}</span>`).join('');
  const nameSection = c.originalName ? `
    <div class="card-name-origin">
      <span class="origin-script">${c.originalName}</span>
      <span class="origin-pronunc">[${c.pronunciation}]</span>
      <span class="origin-meaning">"${c.nameMeaning}"</span>
    </div>` : '';
  return `
  <div class="card" data-tags="${c.tags.join(' ')}" data-testament="${c.testament}">
    <div class="card-header">
      <div class="card-icon ${c.iconClass}">${c.icon}</div>
      <div class="card-meta">
        <div class="card-name">${c.name}</div>
        ${nameSection}
        <div class="card-tags">${tagHTML}</div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-section">
        <div class="card-section-label">Role in Scripture</div>
        <div class="card-text">${c.role}</div>
      </div>
      <div class="card-section">
        <div class="card-section-label">What They Did</div>
        <div class="card-text">${c.deeds}</div>
      </div>
      <div class="card-section">
        <div class="card-section-label">How God Used Them</div>
        <div class="card-text god-used">${c.godUsed}</div>
      </div>
      <div class="card-verse">${c.verse}</div>
    </div>
  </div>`;
}

// Initial render
renderCharacters(characters);

// Search
document.getElementById('searchInput').addEventListener('input', filterCharacters);

// Filter buttons (characters)
document.querySelectorAll('#charactersSection .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#charactersSection .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterCharacters();
  });
});

function filterCharacters() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const activeFilter = document.querySelector('#charactersSection .filter-btn.active').dataset.filter;

  let filtered = characters;

  if (activeFilter !== 'all') {
    filtered = filtered.filter(c => c.tags.includes(activeFilter));
  }

  if (query) {
    filtered = filtered.filter(c =>
      c.name.toLowerCase().includes(query) ||
      c.role.toLowerCase().includes(query) ||
      c.deeds.toLowerCase().includes(query) ||
      c.godUsed.toLowerCase().includes(query) ||
      c.tags.some(t => t.includes(query))
    );
  }

  renderCharacters(filtered);
}

// ==========================================

// ==========================================
// PAGE TABS
// ==========================================
document.querySelectorAll('.page-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const page = tab.dataset.page;
    document.getElementById('charactersSection').style.display = page === 'characters' ? 'block' : 'none';
    document.getElementById('miraclesSection').style.display = page === 'miracles' ? 'block' : 'none';
  });
});

// Update counts
document.getElementById('totalCount').textContent = characters.length;
document.getElementById('charTabCount').textContent = characters.length;
document.getElementById('miracleTabCount').textContent = miracles.length;

// ==========================================
// MIRACLES RENDERING
// ==========================================
function renderMiracles(list) {
  const grid = document.getElementById('miracleGrid');
  const countEl = document.getElementById('miracleCount');

  if (list.length === 0) {
    grid.innerHTML = '<div style="text-align:center;padding:80px;color:var(--text-dim);font-style:italic;grid-column:1/-1">No miracles found. Try a different search.</div>';
    countEl.textContent = '';
    return;
  }

  // Group by testament
  const ot = list.filter(m => m.testament === 'ot');
  const nt = list.filter(m => m.testament === 'nt');

  let html = '';

  if (ot.length > 0) {
    html += `<div class="section-divider" style="grid-column:1/-1"><span class="section-title">✦ Old Testament Miracles ✦</span></div>
    <div class="miracle-grid" style="grid-column:1/-1">${ot.map((m, i) => renderMiracleCard(m, i+1)).join('')}</div>`;
  }
  if (nt.length > 0) {
    const offset = ot.length;
    html += `<div class="section-divider" style="grid-column:1/-1"><span class="section-title">✦ New Testament Miracles ✦</span></div>
    <div class="miracle-grid" style="grid-column:1/-1">${nt.map((m, i) => renderMiracleCard(m, offset+i+1)).join('')}</div>`;
  }

  // If filtered (mixed), just show flat
  if (ot.length === 0 || nt.length === 0) {
    if (ot.length === 0 && nt.length === 0) {
      html = '<div style="text-align:center;padding:80px;color:var(--text-dim);font-style:italic;grid-column:1/-1">No miracles found.</div>';
    }
  }

  grid.innerHTML = `<div style="display:contents">${html}</div>`;
  countEl.textContent = `Showing ${list.length} miracle${list.length !== 1 ? 's' : ''}`;
}

function renderMiracleCard(m, num) {
  const catTagsHTML = m.categories.map(c => {
    const labels = {ot:'Old Testament',nt:'New Testament',creation:'Creation',provision:'Provision',judgment:'Judgment',healing:'Healing',resurrection:'Resurrection',power:'Power',nature:'Nature',protection:'Protection'};
    const cls = {ot:'mtag-ot',nt:'mtag-nt',creation:'mtag-creation',provision:'mtag-provision',judgment:'mtag-judgment',healing:'mtag-healing',resurrection:'mtag-resurrection',power:'mtag-power',nature:'mtag-nature',protection:'mtag-protection'};
    return `<span class="mtag ${cls[c] || ''}">${labels[c] || c}</span>`;
  }).join('');

  return `
  <div class="miracle-card ${m.cardClass}">
    <div class="miracle-header">
      <div class="miracle-num">#${String(num).padStart(3,'0')}</div>
      <div class="miracle-meta">
        <div class="miracle-name">${m.name}</div>
        <div class="miracle-tags">${catTagsHTML}</div>
      </div>
    </div>
    <div class="miracle-body">
      <div class="miracle-section">
        <div class="miracle-section-label">What Happened</div>
        <div class="miracle-text">${m.description}</div>
      </div>
      <div class="miracle-section">
        <div class="miracle-section-label">Significance</div>
        <div class="miracle-text significance">${m.significance}</div>
      </div>
      <div class="miracle-performer">Performed by: <span>${m.performer}</span> &nbsp;·&nbsp; ${m.verse}</div>
    </div>
  </div>`;
}

// Miracles search & filter
document.getElementById('miracleSearch').addEventListener('input', filterMiracles);

document.querySelectorAll('#miracleCatFilters .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#miracleCatFilters .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterMiracles();
  });
});

function filterMiracles() {
  const query = document.getElementById('miracleSearch').value.toLowerCase().trim();
  const activeFilter = document.querySelector('#miracleCatFilters .filter-btn.active').dataset.mcat;

  let filtered = miracles;

  if (activeFilter !== 'all') {
    filtered = filtered.filter(m => m.categories.includes(activeFilter));
  }

  if (query) {
    filtered = filtered.filter(m =>
      m.name.toLowerCase().includes(query) ||
      m.description.toLowerCase().includes(query) ||
      m.significance.toLowerCase().includes(query) ||
      m.performer.toLowerCase().includes(query) ||
      m.verse.toLowerCase().includes(query)
    );
  }

  renderMiracles(filtered);
}

renderMiracles(miracles);

</script>
